<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hoodie Store</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo">NIKE</div>

    <nav>
    <a class="active" href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>

   <div class="user" onclick="goProfile()" id="userIcon"></div>
</header>

<!-- MAIN SECTION -->
<section class="hero">

  <!-- LEFT TEXT -->
  <div class="left">
    <h1>Wear your Style <br> with Comfort</h1>

    <div class="product-info">
       <h2 id="title">Relaxed<br><span id="type">Thin</span></h2>
       <p class="price" id="price">$99.50</p>
      <button onclick="addToCart(
'Winter Heavy',
129.50,
'images/product1.jpg'
)">
Add to cart
</button>
    </div>
  </div>

  <!-- CENTER IMAGE -->
  <div class="center">
    <div class="float-wrapper">
      <img id="jacket" src="images/jacket-1.png">
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <span onclick="changeJacket(0)">750</span>
    <span onclick="changeJacket(1)">500</span>
    <span onclick="changeJacket(2)">250</span>
    <span onclick="changeJacket(3)">SP</span>
  </div>

  <!-- SLIDER (MOVE TO BOTTOM ALWAYS) -->
  <div class="slider">
    <span onclick="changeJacket(0)"></span>
    <span onclick="changeJacket(1)"></span>
    <span onclick="changeJacket(2)"></span>
    <span onclick="changeJacket(3)"></span>
  </div>

</section>

<script src="script.js"></script>
<div id="cartItems"></div>

<script>
const cart = JSON.parse(localStorage.getItem("cart")) || [];
const cartContainer = document.getElementById("cartItems");

if (cart.length === 0) {
    cartContainer.innerHTML = "<h2>Your cart is empty</h2>";
} else {
    cart.forEach(item => {
        cartContainer.innerHTML += `
            <div style="margin-bottom:20px;">
                <img src="${item.image}" width="100">
                <h3>${item.name}</h3>
                <p>Price: $${item.price}</p>
                <p>Quantity: ${item.quantity}</p>
            </div>
        `;
    });
}
</script>
</body>
</html>
